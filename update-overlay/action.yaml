name: Update overlay for workspace
description: Proposes the addition or update of the overlay repository structure for a workspace through a PR 
inputs:
  overlay-repo:
    description: ""
    required: true

  overlay-repo-branch-name:
    description: ""
    required: true

  target-pr-branch-name:
    description: ""
    required: true

  backstage-version:
    description: ""
    required: true

  match-type:
    description: "can be either 'exact' or 'best-effort'"
    required: true

  workspace-name:
    description: ""
    required: true

  workspace-commit:
    description: ""
    required: true

  plugins-repo:
    description: ""
    required: true

  plugins-repo-flat:
    description: ""
    required: true

  plugin-directories:
    description: ""
    required: true

  allow-workspace-addition:
    description: ""    
    required: true

  pr-to-update:
    description: ""    
    required: false
    default: ""

  workspace-json:
    description: "Full workspace JSON object from the gather step, used for metadata updates and future extensions"
    required: false
    default: "{}"

  force:
    description: "Bypass 'source already up-to-date' skip, re-apply metadata tag updates"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install --no-audit --no-fund
    - name: Create PR if necessary
      id: create-pr-if-necessary
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        INPUT_OVERLAY_REPO: ${{ inputs.overlay-repo }}
        INPUT_PLUGINS_REPO: ${{ inputs.plugins-repo }}
        INPUT_OVERLAY_REPO_BRANCH_NAME: ${{ inputs.overlay-repo-branch-name }}
        INPUT_TARGET_PR_BRANCH_NAME: ${{ inputs.target-pr-branch-name }}
        INPUT_BACKSTAGE_VERSION: ${{ inputs.backstage-version }}
        INPUT_MATCH_TYPE: ${{ inputs.match-type }}
        INPUT_WORKSPACE_NAME: ${{ inputs.workspace-name }}
        INPUT_WORKSPACE_COMMIT: ${{ inputs.workspace-commit }}
        INPUT_PLUGINS_REPO_FLAT: ${{ inputs.plugins-repo-flat }}
        INPUT_PLUGIN_DIRECTORIES: ${{ inputs.plugin-directories }}
        INPUT_ALLOW_WORKSPACE_ADDITION: ${{ inputs.allow-workspace-addition }}
        INPUT_PR_TO_UPDATE: ${{ inputs.pr-to-update }}
        INPUT_WORKSPACE_JSON: ${{ inputs.workspace-json }}
        INPUT_FORCE: ${{ inputs.force }}

      with:
        retries: 4
        script: |
          const script = require('${{ github.action_path }}/create-pr-if-necessary.js');
          await script({github, context, core});
